# netlify.toml — dis+capacidad · Equipar para Equipar
# Deploy: conectar este repo en app.netlify.com → "New site from Git"
# No hay build step — Netlify sirve los archivos estáticos directamente.

[build]
  publish = "."

# Redirigir rutas de slides (hash navigation de Reveal.js)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Cache agresivo para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sin cache para HTML (siempre fresco)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
