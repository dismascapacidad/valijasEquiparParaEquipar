<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estilo A — Comando</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0c14; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; }

  .slide {
    width: 100vw; height: 100vh;
    background: #101420;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    position: relative;
  }

  /* Fondo con textura de líneas sutiles */
  .slide::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Panel izquierdo — acento teal grande */
  .left-panel {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: clamp(2rem, 5vw, 5rem);
    border-right: 2px solid #19928B;
  }

  .section-number {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(6rem, 18vw, 14rem);
    line-height: 0.85;
    color: rgba(255,255,255,0.04);
    position: absolute;
    top: 10%;
    left: clamp(1.5rem, 4vw, 4rem);
    letter-spacing: -0.05em;
    user-select: none;
  }

  .label-block {
    animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  .eyebrow {
    font-size: clamp(0.6rem, 1.1vw, 0.85rem);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #19928B;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.7rem;
  }
  .eyebrow::before {
    content: '';
    display: block;
    width: clamp(1.5rem, 3vw, 3rem);
    height: 2px;
    background: #19928B;
  }

  .slide-badge {
    display: inline-block;
    background: #19928B;
    color: #fff;
    font-size: clamp(0.55rem, 0.9vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 2px;
    margin-bottom: 1.8rem;
  }

  .org-line {
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    margin-top: 2rem;
    animation: fadeIn 1.2s 0.8s both;
  }

  /* Panel derecho — título principal */
  .right-panel {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 5vw, 5rem);
    padding-left: clamp(2rem, 4vw, 4.5rem);
  }

  .main-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2.2rem, 6.5vw, 5.5rem);
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #ffffff;
    animation: slideUp 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }
  .main-title .accent { color: #19928B; }

  .subtitle {
    margin-top: clamp(1rem, 2.5vw, 2rem);
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    max-width: 38ch;
    animation: slideUp 0.7s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }

  .teal-bar {
    margin-top: clamp(1.5rem, 3vw, 3rem);
    width: clamp(3rem, 8vw, 6rem);
    height: 3px;
    background: linear-gradient(90deg, #19928B, #2C6890);
    animation: expandBar 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    transform-origin: left;
  }

  .nav-hint {
    position: absolute;
    bottom: clamp(1.5rem, 3vw, 2.5rem);
    right: clamp(1.5rem, 3vw, 2.5rem);
    font-size: clamp(0.55rem, 0.9vw, 0.72rem);
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 0.5rem;
    animation: fadeIn 1.5s 1s both;
  }
  .nav-hint::after { content: '→'; }

  .style-label {
    position: absolute;
    top: clamp(1.2rem, 2vw, 2rem);
    left: clamp(1.5rem, 3vw, 3rem);
    font-size: clamp(0.55rem, 0.85vw, 0.7rem);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #19928B;
    z-index: 10;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes expandBar {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
</style>
</head>
<body>
<div class="slide">
  <span class="style-label">Estilo A — Comando</span>
  <div class="section-number">00</div>

  <!-- Panel izquierdo -->
  <div class="left-panel">
    <div class="label-block">
      <div class="slide-badge">Portada</div>
      <div class="eyebrow">Gobierno de Córdoba</div>
      <div class="org-line">Programa AcceDer &nbsp;·&nbsp; Tecnología Asistiva &nbsp;·&nbsp; 2025</div>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="right-panel">
    <h1 class="main-title">
      Equipar<br>para<br><span class="accent">Equipar</span>
    </h1>
    <p class="subtitle">Tecnología Asistiva para instituciones de rehabilitación de la Provincia de Córdoba</p>
    <div class="teal-bar"></div>
    <div class="nav-hint">Siguiente slide</div>
  </div>
</div>
</body>
</html>
